name: triaegis-ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend files
        run: |
          python -m py_compile api.py auth.py utils/*.py

      - name: Run focused backend tests
        run: |
          pytest -q \
            tests/test_clinical_guardrails.py \
            tests/test_clinical_handoff.py \
            tests/test_medication_safety.py \
            tests/test_followup_planner.py \
            tests/test_privacy_controls.py \
            tests/test_api_security_and_contracts.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
